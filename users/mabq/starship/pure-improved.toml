# Enable via $STARSHIP_CONFIG in `zsh/envs`.

"$schema" = 'https://starship.rs/config-schema.json'

format = """\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$character"""
# $line_break\

[username]
style_root = "cyan"
style_user = "cyan"
format = '[\[$user]($style)'

[hostname]
style = "cyan"
format = '[@$hostname\]]($style) '

[directory]
truncation_length = 0
truncate_to_repo = true
style = "bold cyan"
read_only = ""

[git_branch]
style = "italic cyan"
format = "[$branch]($style) "

[git_status]
style      = "cyan"
format     = '[$all_status]($style)'
ahead      = "⇡${count} "
diverged   = "⇡${ahead_count} ⇣${behind_count} "
behind     = "⇣${count} "
up_to_date = " "
untracked  = "? "
modified   = "* "
conflicted = "(conflicted) "
stashed    = "(stashed) "
staged     = "(staged) "
renamed    = "(renamed) "
deleted    = "(deleted) "

[character]
success_symbol = "[❯](cyan)"
error_symbol = "[✖](cyan)"
vimcmd_symbol = "[❮](cyan)"
